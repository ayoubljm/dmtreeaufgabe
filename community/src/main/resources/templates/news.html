<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>News</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="nav-left">
        <span class="logo">Community</span>

        <a href="/news">News</a>
        <a href="/posts">Feedback</a>
        <a href="/chat">Chat</a>
    </div>

    <div class="nav-right">

        <span sec:authorize="!isAuthenticated()">
            <a href="/login">Login</a>
        </span>

        <span sec:authorize="isAuthenticated()">
            <span class="user-info" sec:authentication="name"></span>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button class="btn logout-btn">Logout</button>
            </form>
        </span>

    </div>

</div>

<!-- CONTENT -->
<div class="container">

    <h1 class="page-title">News</h1>

    <!-- ADMIN BUTTON -->
    <div sec:authorize="hasRole('ADMIN')" style="margin-bottom:20px;">
        <a href="/admin/news/create">
            <button class="btn">➕ News erstellen</button>
        </a>
    </div>

    <!-- NEWS LIST -->
    <div th:each="n : ${newsList}" class="card">

        <h2 th:text="${n.title}"></h2>

        <img th:src="${n.imageUrl}" class="news-image"/>

        <p class="post-content" th:text="${n.content}"></p>

    </div>

</div>

</body>
</html>
