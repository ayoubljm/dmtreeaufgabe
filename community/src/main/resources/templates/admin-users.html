<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="nav-left">
        <span class="logo">Admin Panel</span>
        <a href="/">News</a>
        <a href="/posts">Feedback</a>
        <a href="/chat">Chat</a>
    </div>

    <div class="nav-right">

        <span sec:authorize="!isAuthenticated()">
            <a href="/login">Login</a>
        </span>

        <span sec:authorize="isAuthenticated()">
            <span class="user-info" sec:authentication="name"></span>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button class="btn logout-btn">Logout</button>
            </form>
        </span>

    </div>

</div>

<!-- CONTENT -->
<div class="container">

    <h1 class="page-title">User Management</h1>

    <!-- BACK -->
    <div style="margin-bottom:20px;">
        <a href="/" class="back-link">⬅ Zurück</a>
    </div>

    <!-- SEARCH -->
    <div class="card">

        <h3>User suchen</h3>

        <form action="/admin/chat/search" method="post" class="search-form">

            <div class="search-wrapper">
                <input type="text" name="email" placeholder="Email eingeben" required>
                <button class="btn search-btn">🔍</button>
            </div>

        </form>

        <div th:if="${chatError}" class="error-text">
            <p th:text="${chatError}"></p>
        </div>

    </div>

    <!-- RESULTS -->
    <div th:if="${results != null}">

        <h3 style="margin-top:30px;">Ergebnisse</h3>

        <div th:each="user : ${results}" class="card">

            <div class="user-row">

                <div>
                    <b th:text="${user.email}"></b><br>
                    <span class="user-role" th:text="${user.role}"></span>
                </div>

                <div>
                    <span th:if="${user.canChat}" class="status-ok">
                        ✔ Chat aktiv
                    </span>

                    <span th:if="${!user.canChat}" class="status-bad">
                        ❌ Kein Chat
                    </span>
                </div>

            </div>

            <!-- ACTIONS -->
            <div class="admin-actions">

                <div th:if="${!user.canChat}">
                    <form th:action="@{'/admin/user/chat/' + ${user.id}}" method="post">
                        <button class="btn">Freischalten</button>
                    </form>
                </div>

                <div th:if="${user.canChat}">
                    <form th:action="@{'/admin/chat/remove/' + ${user.id}}" method="post">
                        <button class="btn-danger">Entfernen</button>
                    </form>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
