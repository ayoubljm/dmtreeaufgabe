<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container" style="max-width:400px; margin-top:120px;">

    <div class="card">

        <h2 class="page-title" style="text-align:center;">Login</h2>

        <!-- ERROR -->
        <div th:if="${param.error}" class="popup" style="position:static; transform:none; margin-bottom:15px;">
            <p>Invalid email or password</p>
        </div>

        <!-- FORM -->
        <form method="post" action="/login" class="create-form">

            <label>Email</label>
            <input type="email" name="email" placeholder="Email eingeben..." required>

            <label style="margin-top:15px;">Passwort</label>
            <input type="password" name="password" placeholder="Passwort eingeben..." required>

            <button class="btn" style="margin-top:20px;">
                Login
            </button>

        </form>

        <!-- REGISTER -->
        <div style="text-align:center; margin-top:15px;">
            <a href="/register" class="back-link">Account erstellen</a>
        </div>

    </div>

</div>

</body>
</html>
