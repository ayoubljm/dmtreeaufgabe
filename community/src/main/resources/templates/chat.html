<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Chat</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="nav-left">
        <span class="logo">Community</span>

        <a href="/news" class="nav-link">News</a>
        <a href="/posts" class="nav-link">Feedback</a>
        <a href="/chat" class="nav-link active">Chat</a>

        <a sec:authorize="hasRole('ADMIN')"
           href="/admin/users"
           class="nav-link admin-link">
            Admin
        </a>
    </div>

    <div class="nav-right">

        <span sec:authorize="!isAuthenticated()">
            <a href="/login">Login</a>
        </span>

        <span sec:authorize="isAuthenticated()">
            <span class="user-info" sec:authentication="name"></span>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button class="btn logout-btn">Logout</button>
            </form>
        </span>

    </div>

</div>

<!-- CONTENT -->
<div class="container">

    <h1 class="page-title">💬 Community Chat</h1>

    <!-- POPUP -->
    <div th:if="${showPopup}" class="popup">
        <p th:text="${popupMessage}"></p>
        <button class="btn"
                onclick="this.parentElement.style.display='none'">
            OK
        </button>
    </div>

    <!-- CHAT BOX -->
    <div class="chat-box">

        <div th:each="msg : ${messages}" class="chat-message">

            <div class="chat-user" th:text="${msg.userEmail}"></div>

            <div class="chat-bubble"
                 th:text="${msg.content}">
            </div>

        </div>

    </div>

    <!-- INPUT -->
    <div sec:authorize="isAuthenticated()" class="chat-input">

        <form th:action="@{/chat}" method="post">
            <input type="text" name="content" placeholder="Nachricht schreiben..." required>
            <button class="btn">Senden</button>
        </form>

    </div>

    <div sec:authorize="!isAuthenticated()">
        <p style="color:#A0AEC0;">Bitte loggen Sie sich ein</p>
    </div>

    <a href="/" class="back-link">⬅ Zurück</a>

</div>

</body>
</html>
