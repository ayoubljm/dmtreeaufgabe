<!DOCTYPE html>
<html xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <title>Create Post</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="nav-left">
        <span class="logo">Community</span>

        <a href="/">News</a>
        <a href="/posts">Feedback</a>
        <a href="/chat">Chat</a>
    </div>

    <div class="nav-right">

        <span sec:authorize="!isAuthenticated()">
            <a href="/login">Login</a>
        </span>

        <span sec:authorize="isAuthenticated()">
            <span class="user-info" sec:authentication="name"></span>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button class="btn logout-btn">Logout</button>
            </form>
        </span>

    </div>

</div>

<!-- CONTENT -->
<div class="container">

    <h1 class="page-title">Feedback erstellen</h1>

    <!-- FORM -->
    <div class="card">

        <form method="post" action="/create" class="create-form">

            <label>Titel</label>
            <input type="text" name="title" placeholder="Titel eingeben..." required>

            <label style="margin-top:15px;">Beschreibung</label>
            <textarea name="content" placeholder="Beschreibe dein Feedback..." required></textarea>

            <button class="btn" style="margin-top:20px;">
                Erstellen
            </button>

        </form>

    </div>

    <!-- BACK -->
    <a href="/" class="back-link">⬅ Zurück</a>

</div>

</body>
</html>
